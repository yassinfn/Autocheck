<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCheck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
    }

    .header {
      background: #6366f1;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #6366f1;
      font-size: 14px;
    }

    .header h1 {
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    .header p {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
    }

    .content {
      padding: 20px;
    }

    .site-detected {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #166534;
    }

    .site-not-detected {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #92400e;
    }

    .btn-analyse {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .btn-analyse:hover {
      background: #4f46e5;
    }

    .btn-analyse:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #f1f5f9;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }

    .footer a {
      color: #6366f1;
      text-decoration: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">AC</div>
    <div>
      <h1>AutoCheck</h1>
      <p>Analyseur d'annonces auto</p>
    </div>
  </div>

  <div class="content">
    <div id="site-status"></div>

    <button class="btn-analyse" id="btn-analyse">
      🔍 Analyser cette annonce
    </button>
  </div>

  <div class="footer">
    <a href="https://autocheck-green.vercel.app" target="_blank">autocheck-green.vercel.app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
